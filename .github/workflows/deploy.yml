name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/${{ vars.DO_REGISTRY_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      # ── Backend ───────────────────────────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/notes-backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/notes-backend:latest \
            ./backend

      - name: Push backend image
        run: docker push ${{ env.REGISTRY }}/notes-backend --all-tags

      # ── Frontend ──────────────────────────────────────────────
      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/notes-frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/notes-frontend:latest \
            ./frontend

      - name: Push frontend image
        run: docker push ${{ env.REGISTRY }}/notes-frontend --all-tags

      # ── Deploy to DOKS ────────────────────────────────────────
      - name: Set kubectl context
        run: doctl kubernetes cluster kubeconfig save ${{ vars.DO_CLUSTER_NAME }}

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply database secret
        run: |
          kubectl create secret generic postgres-secret \
            --namespace notes-app \
            --from-literal=POSTGRES_DB=notesdb \
            --from-literal=POSTGRES_USER=notesuser \
            --from-literal=POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply database manifests
        run: kubectl apply -f k8s/database/

      - name: Apply backend manifests
        run: |
          kubectl apply -f k8s/backend/
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/notes-backend:${{ github.sha }} \
            -n notes-app

      - name: Apply frontend manifests
        run: |
          kubectl apply -f k8s/frontend/
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/notes-frontend:${{ github.sha }} \
            -n notes-app

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n notes-app --timeout=120s
          kubectl rollout status deployment/frontend -n notes-app --timeout=120s
